services:
  users-service:
    build: .
    restart: always
    depends_on:
      - postgres-users
    ports:
      - "${PORT}:${PORT}"
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/src/generated
      - ./logs:/app/logs

  postgres-users:
    image: postgres:16
    container_name: ecommerce-postgres-users
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - postgres_users_data:/var/lib/postgresql/data

volumes:
  postgres_users_data:
